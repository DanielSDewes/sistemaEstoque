# Render Blueprint (Infrastructure as Code) for the Sistema de Estoque.
# Deploy: push to GitHub, then in Render -> "New +" -> "Blueprint" and select this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# Topology:
#   - estoque-db:       managed PostgreSQL
#   - estoque-backend:  FastAPI (Docker), auto-runs Alembic migrations + admin seed on boot,
#                       with a persistent disk for uploaded product photos.
#   - estoque-frontend: the Vite SPA served as a static site, calling the API cross-origin.

databases:
  - name: estoque-db
    databaseName: estoque
    user: estoque
    plan: basic-256mb # free tier expires after 90 days — use a paid plan in production

services:
  # --- API: FastAPI + Gunicorn/Uvicorn (backend/Dockerfile) ---
  - type: web
    name: estoque-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /health/ready
    autoDeploy: true
    # A disk keeps product photos across deploys. Note: attaching a disk pins the
    # service to a single instance. To scale horizontally, switch uploads to S3/R2
    # instead (see DEPLOY-PAAS.md).
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true # Render generates a strong random value
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString
      - key: SEED_SAMPLE_DATA
        value: "false"
      # Set to the frontend URL after the first deploy, e.g.
      # https://estoque-frontend.onrender.com
      - key: BACKEND_CORS_ORIGINS
        sync: false
      # First admin, created on first boot. Set a strong password in the dashboard.
      - key: FIRST_ADMIN_EMAIL
        sync: false
      - key: FIRST_ADMIN_PASSWORD
        sync: false

  # --- SPA: built with Vite, served as a static site ---
  - type: web
    name: estoque-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Point the SPA at the API. Set to the backend URL + /api/v1, e.g.
      # https://estoque-backend.onrender.com/api/v1
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      # SPA fallback: serve index.html for client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
