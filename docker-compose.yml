services:
  db:
    image: postgres:16-alpine
    container_name: estoque_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estoque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estoque}
      POSTGRES_DB: ${POSTGRES_DB:-estoque}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estoque} -d ${POSTGRES_DB:-estoque}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: estoque_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-estoque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estoque}
      POSTGRES_DB: ${POSTGRES_DB:-estoque}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ALLOW_NEGATIVE_STOCK: ${ALLOW_NEGATIVE_STOCK:-false}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@estoque.com}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-Admin@123}
      SEED_SAMPLE_DATA: ${SEED_SAMPLE_DATA:-false}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: estoque_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
